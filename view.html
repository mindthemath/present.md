<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Screenshot Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1117;
      --panel: #171b25;
      --panel-2: #1f2532;
      --border: #2c3547;
      --text: #ecf2ff;
      --muted: #9baccc;
      --accent: #88b4ff;
      --missing: #74809a;
      --shadow: rgba(0, 0, 0, 0.25);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .page {
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(15, 17, 23, 0.92);
      backdrop-filter: blur(14px);
      box-shadow: 0 16px 40px var(--shadow);
    }

    .title {
      display: grid;
      gap: 4px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .stats {
      color: var(--muted);
      font-size: 14px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 14px;
      cursor: pointer;
      font: inherit;
    }

    button.active {
      border-color: var(--accent);
      background: var(--panel-2);
      color: #ffffff;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: 0 16px 40px var(--shadow);
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 3;
      background: rgba(23, 27, 37, 0.97);
    }

    tbody th {
      position: sticky;
      left: 0;
      z-index: 2;
      background: rgba(23, 27, 37, 0.97);
    }

    th,
    td {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 12px;
      vertical-align: top;
    }

    thead th:first-child {
      left: 0;
      z-index: 4;
    }

    tr:first-child th,
    tr:first-child td {
      border-top: 0;
    }

    th:first-child,
    td:first-child {
      border-left: 0;
    }

    .axis {
      min-width: 200px;
      max-width: 200px;
      text-align: left;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .axis small,
    .header small {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-weight: 400;
    }

    .header {
      min-width: 240px;
      text-align: left;
    }

    .cell {
      display: grid;
      gap: 8px;
      width: 240px;
    }

    .thumb-link {
      display: block;
      width: fit-content;
      max-width: 100%;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
      background:
        linear-gradient(45deg, rgba(255,255,255,0.04) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.04) 75%, rgba(255,255,255,0.04)),
        linear-gradient(45deg, rgba(255,255,255,0.04) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.04) 75%, rgba(255,255,255,0.04));
      background-position: 0 0, 10px 10px;
      background-size: 20px 20px;
    }

    .meta {
      display: grid;
      gap: 2px;
      font-size: 13px;
    }

    .meta .muted,
    .missing {
      color: var(--muted);
    }

    .missing {
      width: 240px;
      min-height: 180px;
      display: grid;
      place-items: center;
      border: 1px dashed var(--border);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
    }

    @media (max-width: 720px) {
      .page {
        padding: 12px;
      }

      .toolbar {
        padding: 12px;
      }

      .axis {
        min-width: 160px;
      }

      .header,
      .cell,
      .missing {
        width: 180px;
      }
    }
  </style>
</head>

    <section class="table-wrap">
      <table>
        <thead id="table-head"></thead>
        <tbody id="table-body"></tbody>
      </table>
    </section>
  </div>

280x720-desktop-1280x720","resolutionTitle":"desktop-1280x720","width":1280,"height":720,"label":"desktop-1280x720","relativePath":"./slide-16-03/1280x720-desktop-1280x720.png"},{"id":"slide-16-03:1366x768-desktop-1366x768","slide":"slide-16-03","slideTitle":"SLIDE 16 03","resolutionKey":"1366x768-desktop-1366x768","resolutionTitle":"desktop-1366x768","width":1366,"height":768,"label":"desktop-1366x768","relativePath":"./slide-16-03/1366x768-desktop-1366x768.png"},{"id":"slide-16-03:1440x900-desktop-1440x900","slide":"slide-16-03","slideTitle":"SLIDE 16 03","resolutionKey":"1440x900-desktop-1440x900","resolutionTitle":"desktop-1440x900","width":1440,"height":900,"label":"desktop-1440x900","relativePath":"./slide-16-03/1440x900-desktop-1440x900.png"},{"id":"slide-16-03:1920x1080-desktop-1920x1080","slide":"slide-16-03","slideTitle":"SLIDE 16 03","resolutionKey":"1920x1080-desktop-1920x1080","resolutionTitle":"desktop-1920x1080","width":1920,"height":1080,"label":"desktop-1920x1080","relativePath":"./slide-16-03/1920x1080-desktop-1920x1080.png"},{"id":"slide-16-03:2560x1440-desktop-2560x1440","slide":"slide-16-03","slideTitle":"SLIDE 16 03","resolutionKey":"2560x1440-desktop-2560x1440","resolutionTitle":"desktop-2560x1440","width":2560,"height":1440,"label":"desktop-2560x1440","relativePath":"./slide-16-03/2560x1440-desktop-2560x1440.png"}]};
    const state = { groupBy: 'slide' };
    const cacheBustSeed = Date.now();
    const head = document.getElementById('table-head');
    const body = document.getElementById('table-body');
    const stats = document.getElementById('stats');
    const buttons = Array.from(document.querySelectorAll('[data-group]'));
    const screenshotMap = new Map(data.screenshots.map((item) => [item.id, item]));

    function cacheBustedPath(relativePath, index) {
      return relativePath + '?ts=' + cacheBustSeed + '-' + index;
    }

    function getColumns() {
      return state.groupBy === 'slide' ? data.resolutions : data.slides;
    }

    function getRows() {
      return state.groupBy === 'slide' ? data.slides : data.resolutions;
    }

    function getRowTitle(row) {
      return row.title;
    }

    function getColumnTitle(column) {
      return column.title;
    }

    function lookupItem(row, column) {
      if (state.groupBy === 'slide') {
        return screenshotMap.get(row.key + ':' + column.key);
      }

      return screenshotMap.get(column.key + ':' + row.key);
    }

    function renderHeader(columns) {
      const axisLabel = state.groupBy === 'slide' ? 'Slide' : 'Resolution';
      const columnLabel = state.groupBy === 'slide' ? 'Resolutions' : 'Slides';
      const headerCells = columns.map((column) => {
        const detail = state.groupBy === 'slide'
          ? column.width + ' x ' + column.height
          : column.key;
        return '<th class="header">' + getColumnTitle(column) + '<small>' + detail + '</small></th>';
      }).join('');

      head.innerHTML = '<tr><th class="axis">' + axisLabel + '<small>' + columnLabel + '</small></th>' + headerCells + '</tr>';
    }

    function renderRows(rows, columns) {
      let imageIndex = 0;

      body.innerHTML = rows.map((row) => {
        const detail = state.groupBy === 'slide'
          ? row.key
          : row.width + ' x ' + row.height;

        const cells = columns.map((column) => {
          const item = lookupItem(row, column);
          if (!item) {
            return '<td><div class="missing">No screenshot</div></td>';
          }

          imageIndex += 1;
          const bustedPath = cacheBustedPath(item.relativePath, imageIndex);
          return [
            '<td>',
            '  <div class="cell">',
            '    <a class="thumb-link" href="' + bustedPath + '" target="_blank" rel="noreferrer">',
            '      <img loading="lazy" src="' + bustedPath + '" alt="' + item.slideTitle + ' at ' + item.resolutionTitle + '">',
            '    </a>',
            '    <div class="meta">',
            '      <strong>' + item.slideTitle + '</strong>',
            '      <span class="muted">' + item.width + ' x ' + item.height + ' · ' + item.label + '</span>',
            '    </div>',
            '  </div>',
            '</td>',
          ].join('');
        }).join('');

        return '<tr><th class="axis">' + getRowTitle(row) + '<small>' + detail + '</small></th>' + cells + '</tr>';
      }).join('');
    }

    function renderStats() {
      stats.textContent = data.slideCount + ' slides, ' + data.resolutions.length + ' resolutions, ' + data.screenshotCount + ' screenshots. Generated ' + data.generatedAt + '.';
    }

    function render() {
      const columns = getColumns();
      const rows = getRows();

      buttons.forEach((button) => {
        button.classList.toggle('active', button.dataset.group === state.groupBy);
      });

      renderHeader(columns);
      renderRows(rows, columns);
      renderStats();
    }

    buttons.forEach((button) => {
      button.addEventListener('click', () => {
        state.groupBy = button.dataset.group;
        render();
      });
    });

    render();
  </script>
