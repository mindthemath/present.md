<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>present.md - reveal.js</title>

    <link rel="stylesheet" href="./vendor/reveal.js/dist/reveal.css" />
    <link rel="stylesheet" href="./vendor/reveal.js/dist/theme/black.css" id="theme" />
    <link rel="stylesheet" href="./custom.css" />
  </head>
  <body>
    <div id="deck-header" aria-live="polite">
      <span id="deck-header-text"></span>
    </div>

    <div class="reveal">
      <div class="slides">
        <section
          data-slides-markdown-root
          data-markdown
          data-separator="^\r?\n---\r?\n$"
          data-separator-vertical="^\r?\n--\r?\n$"
        ></section>
      </div>
    </div>

    <div id="deck-counter" aria-live="polite"></div>

    <script src="./vendor/reveal.js/dist/reveal.js"></script>
    <script src="./vendor/reveal.js/plugin/markdown/markdown.js"></script>
    <script src="./vendor/reveal.js/plugin/highlight/highlight.js"></script>
    <script src="./vendor/reveal.js/plugin/math/math.js"></script>
    <script>
      const slidesMarkdown = document.querySelector("[data-slides-markdown-root]");
      const header = document.getElementById("deck-header");
      const headerText = document.getElementById("deck-header-text");
      const counter = document.getElementById("deck-counter");
      const rootStyle = document.documentElement.style;
      let deck;
      let deckReady = false;
      let viewportSyncFrame = 0;
      let stableHorizontalSlideCount = 1;
      let lastWalkthroughState = {
        active: false,
        group: "",
        hadHighlights: false,
        targetScroll: 0,
      };

      function transformFencedMath(markdown) {
        return markdown.replace(
          /^```math[ \t]*\r?\n([\s\S]*?)\r?\n```[ \t]*$/gm,
          (_match, block) => `$$\n${block.replace(/\s+$/, "")}\n$$`
        );
      }

      async function loadSlidesMarkdown() {
        const response = await fetch("./present.md", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`Unable to load present.md (${response.status})`);
        }

        const template = document.createElement("script");
        template.type = "text/template";
        template.dataset.template = "";
        template.textContent = transformFencedMath(await response.text());
        slidesMarkdown.replaceChildren(template);
      }

      function slideHeading(slide) {
        if (!slide) return "";
        const heading = slide.querySelector(
          ":scope > h1, :scope > h2, :scope > h3, :scope > h4, :scope > h5, :scope > h6"
        );
        if (!heading) return "";

        const level = Number.parseInt(heading.tagName.slice(1), 10);
        const hashes = Number.isInteger(level) && level >= 1 && level <= 6
          ? "#".repeat(level)
          : "#";

        return `${hashes} ${heading.textContent.trim()}`;
      }

      function clamp01(value) {
        return Math.min(1, Math.max(0, value));
      }

      function smoothStep(value) {
        const t = clamp01(value);
        return t * t * (3 - 2 * t);
      }

      function scaleByWidth(width, minValue, maxValue, power = 1) {
        const minWidth = 375;
        const maxWidth = 2560;
        const normalized = clamp01((width - minWidth) / (maxWidth - minWidth));
        const eased = Math.pow(smoothStep(normalized), power);
        return minValue + (maxValue - minValue) * eased;
      }

      function effectiveViewportWidth() {
        if (window.visualViewport) {
          const { width, scale } = window.visualViewport;
          if (Number.isFinite(width) && Number.isFinite(scale) && scale > 0) {
            return Math.max(window.innerWidth, width * scale);
          }
        }
        return window.innerWidth;
      }

      function setPxVar(name, value) {
        rootStyle.setProperty(name, `${Math.round(value * 100) / 100}px`);
      }

      function syncResponsiveSizing() {
        const width = Math.max(320, effectiveViewportWidth());

        setPxVar("--content-heading-size", scaleByWidth(width, 17.5, 50, 1.02));
        setPxVar("--content-body-size", scaleByWidth(width, 15.5, 48, 1.04));
        setPxVar("--content-table-size", scaleByWidth(width, 10.5, 42, 1.42));
        setPxVar("--content-table-only-size", scaleByWidth(width, 12, 50, 1.28));
        setPxVar("--content-code-size", scaleByWidth(width, 10.75, 34.5, 1.5));
        setPxVar("--content-math-size", scaleByWidth(width, 18, 52, 1.04));
        setPxVar("--chrome-header-size", scaleByWidth(width, 11, 26, 1.02));
        setPxVar("--chrome-header-margin-y", scaleByWidth(width, 6, 12.5, 1));
        setPxVar("--chrome-header-margin-x", scaleByWidth(width, 6, 13, 1));
        setPxVar("--chrome-header-pad-y", scaleByWidth(width, 4, 7.2, 1));
        setPxVar("--chrome-header-pad-x", scaleByWidth(width, 6.5, 13.5, 1));
        setPxVar("--chrome-counter-size", scaleByWidth(width, 11.5, 24, 1.02));
        setPxVar("--chrome-counter-left", scaleByWidth(width, 10, 20.5, 1));
        setPxVar("--chrome-counter-bottom", scaleByWidth(width, 8, 15, 1));
      }

      function syncChromeLayout() {
        syncResponsiveSizing();
        const headerHeight = Math.max(42, Math.ceil(header.getBoundingClientRect().height));
        const counterHeight = Math.max(20, Math.ceil(counter.getBoundingClientRect().height));

        rootStyle.setProperty("--deck-header-offset", `${headerHeight + 16}px`);
        rootStyle.setProperty("--deck-footer-offset", `${counterHeight + 16}px`);

        // Reveal uses slide transforms, not page scrolling. Reset browser zoom drift.
        if (window.scrollX !== 0 || window.scrollY !== 0) {
          window.scrollTo(0, 0);
        }
      }

      function handleViewportChange() {
        cancelAnimationFrame(viewportSyncFrame);
        viewportSyncFrame = requestAnimationFrame(() => {
          syncChromeLayout();
          if (deckReady) {
            updateChrome();
          }
        });
      }

      function normalizeLanguage(lang) {
        const aliases = {
          js: "javascript",
          ts: "typescript",
          sh: "bash",
          yml: "yaml",
          py: "python",
          txt: "text",
        };
        const lower = (lang || "").toLowerCase();
        return aliases[lower] || lower;
      }

      function detectLanguage(code) {
        const classes = Array.from(code.classList || []);
        for (const name of classes) {
          if (name.startsWith("language-")) {
            return normalizeLanguage(name.slice(9));
          }
        }

        const common = new Set([
          "javascript",
          "typescript",
          "bash",
          "json",
          "yaml",
          "python",
          "go",
          "text",
          "js",
          "ts",
          "sh",
          "yml",
          "py",
          "txt",
        ]);

        for (const name of classes) {
          if (common.has(name.toLowerCase())) {
            return normalizeLanguage(name);
          }
        }
        return "";
      }

      function decorateCodeBlocks() {
        document.querySelectorAll(".reveal pre > code").forEach((code) => {
          const pre = code.parentElement;
          if (!pre || pre.dataset.rawDecorated === "1") return;
          pre.dataset.lang = detectLanguage(code);
          pre.dataset.rawDecorated = "1";
          pre.classList.add("raw-fence");
        });
      }

      function isCodeWalkthroughSlide(slide) {
        return !!slide && slide.classList.contains("code-walkthrough");
      }

      function walkthroughGroupKey(slide) {
        if (!slide) return "default";
        const explicitGroup = (slide.dataset.walkthroughGroup || "").trim().toLowerCase();
        if (explicitGroup) return explicitGroup;
        const heading = slide.querySelector(
          ":scope > h1, :scope > h2, :scope > h3, :scope > h4, :scope > h5, :scope > h6"
        );
        const raw = heading ? heading.textContent.trim() : "";
        const base = raw.replace(/\s*\[\d+\/\d+\]\s*$/, "").trim().toLowerCase();
        const slug = base.replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
        return slug || "default";
      }

      function configureWalkthroughAutoAnimateIds() {
        document.querySelectorAll(".reveal .slides section.code-walkthrough").forEach((slide) => {
          const group = walkthroughGroupKey(slide);
          slide.dataset.autoAnimateId = `code-walkthrough-${group}`;
          const pre = slide.querySelector("pre");
          const code = slide.querySelector("pre code");
          if (pre) pre.dataset.id = `code-walkthrough-pre-${group}`;
          if (code) code.dataset.id = `code-walkthrough-code-${group}`;
        });
      }

      function animateScrollTo(element, target, durationMs) {
        const start = element.scrollTop;
        const delta = target - start;
        if (Math.abs(delta) < 2) {
          element.scrollTop = target;
          return;
        }

        const startTs = performance.now();
        const duration = Math.max(120, durationMs);

        function frame(now) {
          const elapsed = now - startTs;
          const t = Math.min(1, elapsed / duration);
          const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
          element.scrollTop = start + delta * eased;
          if (t < 1) requestAnimationFrame(frame);
        }

        requestAnimationFrame(frame);
      }

      function runWalkthroughEffects() {
        const slide = deck.getCurrentSlide();
        if (!isCodeWalkthroughSlide(slide)) {
          document
            .querySelectorAll(".reveal .slides section.code-walkthrough.walkthrough-enter")
            .forEach((node) => node.classList.remove("walkthrough-enter"));

          lastWalkthroughState = {
            active: false,
            group: "",
            hadHighlights: false,
            targetScroll: 0,
          };
          return;
        }

        const group = walkthroughGroupKey(slide);
        const code = slide.querySelector("pre code");
        if (!code) return;

        const firstHighlight = code.querySelector(".highlight-line");
        const hasHighlights = !!firstHighlight;
        const targetScroll = hasHighlights
          ? Math.max(0, firstHighlight.offsetTop - code.clientHeight * 0.2)
          : 0;
        const sameGroup = lastWalkthroughState.active && lastWalkthroughState.group === group;
        const startScroll = sameGroup ? lastWalkthroughState.targetScroll : 0;

        // Set initial position immediately to avoid one-frame focus flash.
        code.scrollTop = startScroll;

        const shouldFadeFromBright = hasHighlights && (!sameGroup || !lastWalkthroughState.hadHighlights);
        if (shouldFadeFromBright) {
          slide.classList.add("walkthrough-enter");
        } else {
          slide.classList.remove("walkthrough-enter");
        }

        requestAnimationFrame(() => {
          slide.classList.remove("walkthrough-enter");
          animateScrollTo(code, targetScroll, 560);
        });

        lastWalkthroughState = {
          active: true,
          group,
          hadHighlights: hasHighlights,
          targetScroll,
        };
      }

      function syncHashNow() {
        if (!deckReady) return;
        const { h, v, f } = deck.getIndices();
        const parts = [h + 1];

        if (v > 0 || f > 0) parts.push(v + 1);
        if (f > 0) parts.push(f + 1);

        const nextHash = `#/${parts.join("/")}`;
        if (window.location.hash !== nextHash) {
          window.history.replaceState(null, "", nextHash);
        }
      }

      function currentPositionLabel(indices, horizontalSlides) {
        const { h, v } = indices;
        const safeIndex = Math.min(Math.max(h, 0), Math.max(horizontalSlides.length - 1, 0));
        const currentHorizontal = horizontalSlides[safeIndex];
        const verticalCount = currentHorizontal
          ? currentHorizontal.querySelectorAll(":scope > section").length
          : 0;

        if (verticalCount > 0) {
          return `${safeIndex + 1}.${v + 1}`;
        }

        return `${safeIndex + 1}`;
      }

      function updateChrome() {
        configureWalkthroughAutoAnimateIds();
        decorateCodeBlocks();
        const indices = deck.getIndices();
        const horizontalSlides = deck.getHorizontalSlides();
        if (horizontalSlides.length > 0) {
          stableHorizontalSlideCount = horizontalSlides.length;
        }
        headerText.textContent = slideHeading(deck.getCurrentSlide());
        const current = currentPositionLabel(indices, horizontalSlides);
        const total = Math.max(1, stableHorizontalSlideCount);
        counter.textContent = `${current} / ${total} | present.md`;
        syncChromeLayout();
        syncHashNow();
        runWalkthroughEffects();
      }

      async function bootstrapDeck() {
        await loadSlidesMarkdown();

        deck = new Reveal({
          hash: true,
          hashOneBasedIndex: true,
          navigationMode: "default",
          disableLayout: true,
          center: false,
          controls: false,
          progress: false,
          transition: "none",
          katex: {
            local: "./vendor/katex",
          },
          plugins: [RevealMarkdown, RevealHighlight, RevealMath.KaTeX()],
        });

        deck.on("ready", () => {
          deckReady = true;
          stableHorizontalSlideCount = Math.max(1, deck.getHorizontalSlides().length);
          updateChrome();
        });
        deck.on("slidechanged", updateChrome);
        deck.on("fragmentshown", updateChrome);
        deck.on("fragmenthidden", updateChrome);
        window.addEventListener("resize", handleViewportChange);
        if (window.visualViewport) {
          window.visualViewport.addEventListener("resize", handleViewportChange);
        }

        await deck.initialize();
      }

      bootstrapDeck().catch((error) => {
        console.error(error);
        headerText.textContent = "Failed to load present.md";
        counter.textContent = "error";
      });
    </script>
  </body>
</html>
